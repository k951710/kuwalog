<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('メッセージ')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:700px;">

    <h1 class="h4 mb-4" style="letter-spacing:0.1em;">メッセージ</h1>

    <div th:if="${#lists.isEmpty(conversations)}" class="kw-card p-4"
         style="color:var(--kw-muted); font-size:0.9rem;">
        メッセージはありません。
    </div>

    <div th:unless="${#lists.isEmpty(conversations)}">
        <a th:each="c : ${conversations}"
           th:href="@{/conversations/{id}(id=${c.id})}"
           class="kw-card d-block p-3 mb-2 text-decoration-none"
           style="color:var(--kw-text);">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span style="font-size:0.95rem; font-weight:500;"
                          th:text="${c.beetle.name}"></span>
                    <span class="ms-3" style="font-size:0.85rem; color:var(--kw-muted);">
                        相手:
                        <span th:text="${c.initiator.username == loginUsername ? c.owner.username : c.initiator.username}"></span>
                    </span>
                </div>
                <span style="font-size:0.8rem; color:var(--kw-muted);"
                      th:text="${#temporals.format(c.createdAt, 'yyyy/MM/dd')}"></span>
            </div>
        </a>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
