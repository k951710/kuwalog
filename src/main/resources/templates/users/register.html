<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('新規登録')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container d-flex justify-content-center" style="max-width:420px;">
    <div style="width:100%;">

        <h1 class="h4 mb-4 text-center" style="letter-spacing:0.1em;">新規登録</h1>

        <div class="kw-card p-4">
            <form th:action="@{/users/register}" th:object="${userRegisterForm}" method="post">

                <div class="mb-3">
                    <label class="form-label">ユーザー名</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control">
                    <div th:if="${#fields.hasErrors('username')}" class="text-danger small mt-1" th:errors="*{username}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">メールアドレス</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control">
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">パスワード（8文字以上）</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control">
                    <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1" th:errors="*{password}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">パスワード（確認）</label>
                    <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" class="form-control">
                    <div th:if="${#fields.hasErrors('passwordConfirm')}" class="text-danger small mt-1" th:errors="*{passwordConfirm}"></div>
                </div>

                <button type="submit" class="btn btn-kw-primary w-100">登録する</button>
            </form>
        </div>

        <p class="text-center mt-3" style="font-size:0.85rem; color:var(--kw-muted);">
            すでにアカウントをお持ちの方は
            <a th:href="@{/login}">ログイン</a>
        </p>

    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
