<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('生体編集')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:680px;">

    <h1 class="h4 mb-4" style="letter-spacing:0.1em;">生体編集</h1>

    <div class="kw-card p-4">
        <form th:action="@{/beetles/{id}/edit(id=${beetleId})}" th:object="${beetleForm}" method="post" enctype="multipart/form-data">

            <p class="kw-section-title">基本情報</p>

            <div class="mb-3">
                <label class="form-label">分類</label>
                <select id="classification" th:field="*{classification}" class="form-select">
                    <option value="">選択してください</option>
                    <option th:each="c : ${classificationValues}" th:value="${c}" th:text="${c.label}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">名前 <span style="color:#e05555;">*</span></label>
                <input type="text" id="name" th:field="*{name}" class="form-control">
                <div th:if="${#fields.hasErrors('name')}" class="text-danger small mt-1" th:errors="*{name}"></div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col">
                    <label class="form-label">性別 <span style="color:#e05555;">*</span></label>
                    <select id="sex" th:field="*{sex}" class="form-select">
                        <option th:each="s : ${sexValues}" th:value="${s}" th:text="${s.label}"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('sex')}" class="text-danger small mt-1" th:errors="*{sex}"></div>
                </div>
                <div class="col">
                    <label class="form-label">ステージ <span style="color:#e05555;">*</span></label>
                    <select id="stage" th:field="*{stage}" class="form-select">
                        <option th:each="s : ${stageValues}" th:value="${s}" th:text="${s.label}"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('stage')}" class="text-danger small mt-1" th:errors="*{stage}"></div>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col">
                    <label class="form-label">産地</label>
                    <input type="text" id="locality" th:field="*{locality}" class="form-control" placeholder="例: 山梨県">
                </div>
                <div class="col">
                    <label class="form-label">累代</label>
                    <div class="d-flex gap-2">
                        <select id="gen_prefix" class="form-select" onchange="updateGeneration()">
                            <option value="">-</option>
                            <option value="WD">WD</option>
                            <option value="F">F</option>
                            <option value="CBF">CBF</option>
                        </select>
                        <select id="gen_num" class="form-select" onchange="updateGeneration()" style="display:none;">
                            <option th:each="i : ${#numbers.sequence(1, 10)}" th:value="${i}" th:text="${i}"></option>
                        </select>
                    </div>
                    <input type="hidden" id="generation" th:field="*{generation}">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col">
                    <label class="form-label">羽化時期</label>
                    <input type="month" id="emergenceDate" th:field="*{emergenceDate}" class="form-control">
                </div>
                <div class="col">
                    <label class="form-label">生産者</label>
                    <input type="text" id="breederName" th:field="*{breederName}" class="form-control" placeholder="ユーザー名">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col">
                    <label class="form-label">サイズ（mm）</label>
                    <input type="number" id="sizeMm" th:field="*{sizeMm}" class="form-control" step="0.1" min="0.1" placeholder="例: 75.5">
                </div>
                <div class="col">
                    <label class="form-label">重さ（g）</label>
                    <input type="number" id="weightG" th:field="*{weightG}" class="form-control" step="0.1" min="0.1" placeholder="例: 12.3">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">説明</label>
                <textarea id="description" th:field="*{description}" class="form-control" rows="4"></textarea>
            </div>

            <p class="kw-section-title">親個体</p>

            <div id="father-data" style="display:none">
                <span th:each="b : ${fatherCandidates}"
                      th:attr="data-id=${b.id},data-pid=${b.publicId ?: ''},data-name=${b.name},data-cls=${b.classification ?: ''},data-loc=${b.locality ?: ''},data-eme=${b.emergenceDate ?: ''}"></span>
            </div>

            <div class="mb-3">
                <label class="form-label">父個体（任意）</label>
                <div class="mb-2">
                    <input type="text" id="father_id_input" class="form-control form-control-sm" placeholder="公開IDで直接指定（例: S26000001）">
                    <div class="small mt-1" style="color:var(--kw-muted);">公開IDは生体詳細ページの右上に表示されています</div>
                    <div id="father_id_msg" class="small mt-1"></div>
                </div>
                <div class="d-flex gap-2 mb-2">
                    <select id="father_cls" class="form-select form-select-sm"></select>
                    <select id="father_loc" class="form-select form-select-sm"></select>
                    <select id="father_eme" class="form-select form-select-sm"></select>
                </div>
                <select id="father_sel" class="form-select form-select-sm"></select>
                <input type="hidden" th:field="*{fatherId}">
            </div>

            <div id="mother-data" style="display:none">
                <span th:each="b : ${motherCandidates}"
                      th:attr="data-id=${b.id},data-pid=${b.publicId ?: ''},data-name=${b.name},data-cls=${b.classification ?: ''},data-loc=${b.locality ?: ''},data-eme=${b.emergenceDate ?: ''}"></span>
            </div>

            <div class="mb-4">
                <label class="form-label">母個体（任意）</label>
                <div class="mb-2">
                    <input type="text" id="mother_id_input" class="form-control form-control-sm" placeholder="公開IDで直接指定（例: S26000001）">
                    <div class="small mt-1" style="color:var(--kw-muted);">公開IDは生体詳細ページの右上に表示されています</div>
                    <div id="mother_id_msg" class="small mt-1"></div>
                </div>
                <div class="d-flex gap-2 mb-2">
                    <select id="mother_cls" class="form-select form-select-sm"></select>
                    <select id="mother_loc" class="form-select form-select-sm"></select>
                    <select id="mother_eme" class="form-select form-select-sm"></select>
                </div>
                <select id="mother_sel" class="form-select form-select-sm"></select>
                <input type="hidden" th:field="*{motherId}">
            </div>

            <p class="kw-section-title">画像</p>

            <!-- 登録済み画像 -->
            <div th:if="${not #lists.isEmpty(images)}" class="mb-3">
                <label class="form-label">登録済み画像</label>
                <div class="d-flex gap-2 flex-wrap">
                    <div th:each="img : ${images}" class="position-relative">
                        <img th:src="${img.imageUrl}" alt="生体画像"
                             style="width:100px; height:100px; object-fit:cover; border-radius:4px; border:2px solid var(--kw-border);"
                             th:style="${img.primary} ? 'border-color:var(--kw-accent-light);' : ''">
                        <div class="d-flex gap-1 mt-1">
                            <form th:unless="${img.primary}"
                                  th:action="@{/beetles/{bid}/images/{iid}/primary(bid=${beetleId},iid=${img.id})}"
                                  method="post" class="m-0">
                                <button type="submit" class="btn btn-kw-outline" style="font-size:0.65rem; padding:2px 6px;">代表</button>
                            </form>
                            <form th:action="@{/beetles/{bid}/images/{iid}/delete(bid=${beetleId},iid=${img.id})}"
                                  method="post" class="m-0"
                                  onsubmit="return confirm('この画像を削除しますか？');">
                                <button type="submit" class="btn btn-outline-danger" style="font-size:0.65rem; padding:2px 6px;">削除</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.size(images) < 4}" class="mb-4">
                <label class="form-label">画像を追加（最大4枚）</label>
                <input type="file" name="images" accept="image/*" multiple class="form-control">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-kw-primary">更新する</button>
                <a th:href="@{/beetles/{id}(id=${beetleId})}" class="btn btn-kw-outline">キャンセル</a>
            </div>

        </form>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/parentCascade.js}"></script>
<script>
var fatherData = readCandidates('father-data');
var motherData = readCandidates('mother-data');
initCascade('father', fatherData, 'fatherId');
initCascade('mother', motherData, 'motherId');

function updateGeneration() {
    var prefix = document.getElementById('gen_prefix').value;
    var numSel = document.getElementById('gen_num');
    var genField = document.getElementById('generation');
    if (prefix === 'WD') {
        numSel.style.display = 'none';
        genField.value = 'WD';
    } else if (prefix === '') {
        numSel.style.display = 'none';
        genField.value = '';
    } else {
        numSel.style.display = '';
        genField.value = prefix + numSel.value;
    }
}

// 既存の累代値をプルダウンに復元
(function restoreGeneration() {
    var val = document.getElementById('generation').value;
    if (!val) return;
    var prefix = document.getElementById('gen_prefix');
    var numSel = document.getElementById('gen_num');
    if (val === 'WD') {
        prefix.value = 'WD';
    } else if (val.startsWith('CBF')) {
        prefix.value = 'CBF';
        numSel.value = val.replace('CBF', '');
        numSel.style.display = '';
    } else if (val.startsWith('F')) {
        prefix.value = 'F';
        numSel.value = val.replace('F', '');
        numSel.style.display = '';
    }
})();
</script>
</body>
</html>
