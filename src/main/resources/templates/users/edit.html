<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('プロフィール編集')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:560px;">

    <h1 class="h4 mb-4" style="letter-spacing:0.1em;">プロフィール編集</h1>

    <div class="kw-card p-4">
        <form th:action="@{/users/{u}/edit(u=${username})}" th:object="${userProfileForm}"
              method="post" enctype="multipart/form-data">

            <div class="mb-4">
                <label class="form-label">プロフィール画像（2MB以下）</label>
                <input type="file" id="profileImage" name="profileImage" accept="image/*" class="form-control">
            </div>

            <div class="mb-4">
                <label class="form-label">自己紹介（500文字以内）</label>
                <textarea id="bio" th:field="*{bio}" rows="6" class="form-control"
                          placeholder="自己紹介を入力してください"></textarea>
                <div th:if="${#fields.hasErrors('bio')}" class="text-danger small mt-1" th:errors="*{bio}"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-kw-primary">保存する</button>
                <a th:href="@{/users/{u}(u=${username})}" class="btn btn-kw-outline">キャンセル</a>
            </div>

        </form>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
