<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>生体一覧 - クワログ</title>
</head>
<body>

<h1>生体一覧</h1>

<a th:href="@{/beetles/new}">新規投稿</a>

<div th:if="${#lists.isEmpty(beetles)}">
    <p>まだ生体が登録されていません。</p>
</div>

<table th:unless="${#lists.isEmpty(beetles)}">
    <thead>
        <tr>
            <th>名前</th>
            <th>性別</th>
            <th>ステージ</th>
            <th>産地</th>
            <th>累代</th>
            <th>羽化時期</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="beetle : ${beetles}">
            <td><a th:href="@{/beetles/{id}(id=${beetle.id})}" th:text="${beetle.name}"></a></td>
            <td th:text="${beetle.sex}"></td>
            <td th:text="${beetle.stage}"></td>
            <td th:text="${beetle.locality}"></td>
            <td th:text="${beetle.generation}"></td>
            <td th:text="${beetle.emergenceDate}"></td>
        </tr>
    </tbody>
</table>

<hr>
<form th:action="@{/logout}" method="post">
    <button type="submit">ログアウト</button>
</form>

</body>
</html>
