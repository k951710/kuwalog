<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head(${profile.user.username})}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:860px;">

    <!-- プロフィールヘッダー -->
    <div class="d-flex align-items-center gap-4 mb-5">
        <div>
            <img th:if="${profile.user.profileImageUrl != null}"
                 th:src="${profile.user.profileImageUrl}"
                 alt="プロフィール画像"
                 style="width:80px; height:80px; object-fit:cover; border-radius:50%; border:2px solid var(--kw-border);">
            <div th:if="${profile.user.profileImageUrl == null}"
                 style="width:80px; height:80px; border-radius:50%; background:var(--kw-surface); border:2px solid var(--kw-border); display:flex; align-items:center; justify-content:center; color:var(--kw-muted); font-size:1.5rem;">
                &#128027;
            </div>
        </div>
        <div>
            <h1 class="h3 m-0" th:text="${profile.user.username}"></h1>
            <p class="mt-1 mb-0" style="font-size:0.85rem; color:var(--kw-muted);">
                登録日: <span th:text="${#temporals.format(profile.user.createdAt, 'yyyy/MM/dd')}"></span>
            </p>
        </div>
        <div class="ms-auto">
            <a th:if="${profile.user.username == loginUsername}"
               th:href="@{/users/{u}/edit(u=${profile.user.username})}"
               class="btn btn-sm btn-kw-outline">プロフィールを編集</a>
        </div>
    </div>

    <!-- 自己紹介 -->
    <div th:if="${profile.user.bio != null}" class="kw-card p-4 mb-4">
        <p class="kw-section-title">自己紹介</p>
        <p style="font-size:0.9rem; line-height:1.8; margin:0;" th:text="${profile.user.bio}"></p>
    </div>

    <!-- 評価サマリー -->
    <div class="kw-card p-4 mb-4">
        <p class="kw-section-title">評価サマリー</p>
        <div th:if="${profile.reviewCount == 0}" style="color:var(--kw-muted); font-size:0.9rem;">
            まだ評価がありません。
        </div>
        <div th:unless="${profile.reviewCount == 0}" class="d-flex gap-4">
            <div>
                <div style="font-size:1.8rem; font-weight:700;" th:text="${#numbers.formatDecimal(profile.avgRating, 1, 1)}"></div>
                <div style="font-size:0.75rem; color:var(--kw-muted);">平均評価 / 5</div>
            </div>
            <div>
                <div style="font-size:1.8rem; font-weight:700;" th:text="${profile.reviewCount}"></div>
                <div style="font-size:0.75rem; color:var(--kw-muted);">総評価件数</div>
            </div>
        </div>
    </div>

    <!-- 受けた評価 -->
    <div class="mb-4" th:unless="${#lists.isEmpty(profile.receivedReviews)}">
        <p class="kw-section-title">受けた評価</p>
        <div class="kw-card">
            <table class="table kw-table mb-0">
                <thead>
                    <tr>
                        <th class="py-3 px-3">種別</th>
                        <th class="py-3">評価</th>
                        <th class="py-3">コメント</th>
                        <th class="py-3">評価者</th>
                        <th class="py-3">日時</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${profile.receivedReviews}">
                        <td class="px-3 py-3" style="font-size:0.85rem;" th:text="${r.reviewType.label}"></td>
                        <td class="py-3" th:text="${r.rating}"></td>
                        <td class="py-3" style="font-size:0.85rem;" th:text="${r.comment ?: '-'}"></td>
                        <td class="py-3">
                            <a th:href="@{/users/{u}(u=${r.reviewer.username})}"
                               th:text="${r.reviewer.username}" style="font-size:0.85rem;"></a>
                        </td>
                        <td class="py-3" style="font-size:0.8rem; color:var(--kw-muted);"
                            th:text="${#temporals.format(r.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 投稿した生体 -->
    <div>
        <p class="kw-section-title">投稿した生体</p>
        <div th:if="${#lists.isEmpty(profile.beetles)}" style="color:var(--kw-muted); font-size:0.9rem;">
            投稿した生体はありません。
        </div>
        <div th:unless="${#lists.isEmpty(profile.beetles)}"
             class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-3">
            <div th:each="b : ${profile.beetles}" class="col">
                <a th:href="@{/beetles/{id}(id=${b.id})}" class="text-decoration-none">
                    <div class="position-relative overflow-hidden"
                         style="border-radius:6px; aspect-ratio:1; background:var(--kw-surface); border:1px solid var(--kw-border);">
                        <img th:if="${imageMap[b.id] != null}"
                             th:src="${imageMap[b.id]}"
                             alt="生体画像"
                             style="width:100%; height:100%; object-fit:cover;">
                        <img th:if="${imageMap[b.id] == null}"
                             th:src="@{/オオクワシルエット.png}"
                             alt="画像なし"
                             style="width:100%; height:100%; object-fit:contain; padding:0.5rem; opacity:0.3;">
                        <div style="position:absolute; bottom:0; left:0; right:0;
                                    background:linear-gradient(transparent, rgba(0,0,0,0.65));
                                    padding:0.5rem 0.5rem 0.4rem;
                                    color:#fff; font-size:0.8rem; font-weight:600;
                                    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"
                             th:text="${b.name}"></div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
