<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('譲渡記録登録')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:480px;">

    <nav class="mb-4" style="font-size:0.8rem; color:var(--kw-muted);">
        <a th:href="@{/beetles}">生体一覧</a>
        <span class="mx-2">/</span>
        <a th:href="@{/beetles/{id}(id=${beetle.id})}" th:text="${beetle.name}"></a>
        <span class="mx-2">/</span>
        <span>譲渡記録登録</span>
    </nav>

    <h1 class="h4 mb-4" style="letter-spacing:0.1em;">譲渡記録登録</h1>

    <div class="kw-card p-4">
        <form th:action="@{/beetles/{id}/transactions(id=${beetle.id})}"
              th:object="${transactionForm}" method="post">

            <div class="mb-3">
                <label class="form-label">譲渡先ユーザー名</label>
                <input type="text" id="toUsername" th:field="*{toUsername}" class="form-control">
                <div th:if="${#fields.hasErrors('toUsername')}" class="text-danger small mt-1" th:errors="*{toUsername}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label">譲渡日</label>
                <input type="date" id="transferredOn" th:field="*{transferredOn}" class="form-control">
                <div th:if="${#fields.hasErrors('transferredOn')}" class="text-danger small mt-1" th:errors="*{transferredOn}"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-kw-primary">登録する</button>
                <a th:href="@{/beetles/{id}(id=${beetle.id})}" class="btn btn-kw-outline">キャンセル</a>
            </div>

        </form>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
