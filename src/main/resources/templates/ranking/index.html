<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('サイズランキング')}"></th:block>
    <style>
        .rank-num {
            font-size: 1.2rem;
            font-weight: 700;
            min-width: 2rem;
            color: var(--kw-muted);
        }
        .rank-num.gold   { color: #c49a2a; }
        .rank-num.silver { color: #aaa; }
        .rank-num.bronze { color: #b07040; }
        .species-tab {
            background: none;
            border: 1px solid var(--kw-border);
            color: var(--kw-muted);
            border-radius: 4px;
            padding: 0.3rem 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .species-tab.active {
            background: var(--kw-accent);
            border-color: var(--kw-accent);
            color: #fff;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:800px;">

    <h1 class="h4 mb-4" style="letter-spacing:0.1em;">サイズランキング</h1>

    <!-- 種タブ -->
    <div class="d-flex flex-wrap gap-2 mb-4" id="speciesTabs">
        <th:block th:each="entry, i : ${rankings}">
            <button class="species-tab"
                    th:classappend="${i.index == 0} ? ' active'"
                    th:attr="data-target=${'section-' + entry.key.name()}"
                    onclick="switchTab(this)"
                    th:text="${entry.key.label}"></button>
        </th:block>
    </div>

    <!-- 種別セクション -->
    <th:block th:each="entry, i : ${rankings}">
        <div th:id="'section-' + ${entry.key.name()}"
             th:style="${i.index != 0} ? 'display:none'">

            <div th:if="${#lists.isEmpty(entry.value)}" class="kw-card p-4"
                 style="color:var(--kw-muted); font-size:0.9rem;">
                まだランキングデータがありません。生体登録時に種を設定してください。
            </div>

            <div th:unless="${#lists.isEmpty(entry.value)}" class="kw-card">
                <table class="table kw-table mb-0">
                    <thead>
                        <tr>
                            <th class="py-3" style="width:3rem;">順位</th>
                            <th class="py-3">生体名</th>
                            <th class="py-3">サイズ</th>
                            <th class="py-3">投稿者</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b, idx : ${entry.value}">
                            <td class="py-3">
                                <span class="rank-num"
                                      th:classappend="${idx.index == 0} ? ' gold' : (${idx.index == 1} ? ' silver' : (${idx.index == 2} ? ' bronze' : ''))"
                                      th:text="${idx.index + 1}"></span>
                            </td>
                            <td class="py-3">
                                <a th:href="@{/beetles/{id}(id=${b.id})}"
                                   th:text="${b.name}"></a>
                            </td>
                            <td class="py-3" style="font-family:monospace;"
                                th:text="${b.sizeMm + ' mm'}"></td>
                            <td class="py-3">
                                <a th:href="@{/users/{u}(u=${b.user.username})}"
                                   th:text="${b.user.username}"></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function switchTab(btn) {
    document.querySelectorAll('.species-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="section-"]').forEach(s => s.style.display = 'none');
    document.getElementById(btn.dataset.target).style.display = 'block';
}
</script>
</body>
</html>
