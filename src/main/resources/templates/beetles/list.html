<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('生体一覧')}"></th:block>
    <style>
        .beetle-card {
            background-color: var(--kw-surface);
            border: 1px solid var(--kw-border);
            border-radius: 4px;
            transition: border-color 0.2s;
            text-decoration: none;
            color: var(--kw-text);
            display: block;
        }
        .beetle-card:hover {
            border-color: var(--kw-accent);
            color: var(--kw-text);
        }
        .beetle-card-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px 4px 0 0;
            background-color: #111;
        }
        .beetle-card-noimg {
            width: 100%;
            aspect-ratio: 1;
            background-color: #111;
            border-radius: 4px 4px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--kw-border);
            font-size: 2rem;
        }
        .page-link-kw {
            background-color: var(--kw-surface);
            border-color: var(--kw-border);
            color: var(--kw-text);
        }
        .page-link-kw:hover {
            background-color: var(--kw-border);
            color: var(--kw-text);
            border-color: var(--kw-border);
        }
        .page-item.active .page-link-kw {
            background-color: var(--kw-accent);
            border-color: var(--kw-accent);
            color: #fff;
        }
        .page-item.disabled .page-link-kw {
            background-color: var(--kw-surface);
            border-color: var(--kw-border);
            color: var(--kw-muted);
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:1100px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4 m-0" style="letter-spacing:0.1em;">生体一覧</h1>
        <a class="btn btn-sm btn-kw-primary" th:href="@{/beetles/new}"
           th:if="${isAuthenticated}">+ 新規投稿</a>
    </div>

    <!-- サイズTOP3 -->
    <div th:unless="${#lists.isEmpty(top3)}" class="kw-card p-3 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="kw-section-title m-0">サイズTOP3</span>
            <a th:href="@{/ranking}" style="font-size:0.8rem;">ランキングを見る →</a>
        </div>
        <div class="d-flex gap-3 flex-wrap">
            <a th:each="b, idx : ${top3}"
               th:href="@{/beetles/{id}(id=${b.id})}"
               class="d-flex align-items-center gap-2 text-decoration-none"
               style="color:var(--kw-text);">
                <span style="font-size:1rem; font-weight:700;"
                      th:style="${idx.index == 0} ? 'color:#c49a2a' : (${idx.index == 1} ? 'color:#aaa' : 'color:#b07040')"
                      th:text="${idx.index + 1} + '位'"></span>
                <span th:text="${b.name}" style="font-size:0.9rem;"></span>
                <span th:text="${b.sizeMm + ' mm'}" style="font-size:0.85rem; color:var(--kw-muted); font-family:monospace;"></span>
                <span th:text="${'(' + b.species + ')'}" style="font-size:0.8rem; color:var(--kw-muted);"></span>
            </a>
        </div>
    </div>

    <!-- 絞り込みフォーム -->
    <div class="kw-card p-3 mb-4">
        <form th:action="@{/beetles}" method="get" class="row g-2 align-items-end">
            <div class="col-auto">
                <label class="form-label">分類</label>
                <select name="classification" class="form-select form-select-sm">
                    <option value="">すべて</option>
                    <option th:each="c : ${classificationValues}"
                            th:value="${c}" th:text="${c.label}"
                            th:selected="${c == selectedClassification}"></option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label">性別</label>
                <select name="sex" class="form-select form-select-sm">
                    <option value="">すべて</option>
                    <option th:each="s : ${sexValues}"
                            th:value="${s}" th:text="${s.label}"
                            th:selected="${s == selectedSex}"></option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label">ステージ</label>
                <select name="stage" class="form-select form-select-sm">
                    <option value="">すべて</option>
                    <option th:each="s : ${stageValues}"
                            th:value="${s}" th:text="${s.label}"
                            th:selected="${s == selectedStage}"></option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label">産地</label>
                <input type="text" name="locality" class="form-control form-control-sm"
                       placeholder="部分一致" th:value="${selectedLocality}">
            </div>
            <div class="col-auto d-flex gap-2">
                <button type="submit" class="btn btn-sm btn-kw-primary">絞り込む</button>
                <a th:href="@{/beetles}" class="btn btn-sm btn-kw-outline">リセット</a>
            </div>
        </form>
    </div>

    <div th:if="${beetlePage.totalElements == 0}" class="text-center py-5" style="color:var(--kw-muted);">
        該当する生体が見つかりませんでした。
    </div>

    <!-- カードグリッド -->
    <div th:unless="${beetlePage.totalElements == 0}" class="row g-3 mb-4">
        <div th:each="beetle : ${beetlePage.content}" class="col-6 col-md-4 col-lg-3">
            <a th:href="@{/beetles/{id}(id=${beetle.id})}" class="beetle-card">
                <img th:if="${imageMap[beetle.id] != null}"
                     th:src="${imageMap[beetle.id]}"
                     alt="生体画像" class="beetle-card-img">
                <div th:if="${imageMap[beetle.id] == null}" class="beetle-card-noimg">&#128027;</div>
                <div class="p-3">
                    <div class="fw-500 mb-2" style="font-size:0.95rem;" th:text="${beetle.name}"></div>
                    <table style="width:100%; font-size:0.78rem;">
                        <tr>
                            <td style="color:var(--kw-muted); padding-bottom:3px;">サイズ</td>
                            <td style="padding-bottom:3px;" th:text="${beetle.sizeMm != null ? beetle.sizeMm + ' mm' : '-'}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--kw-muted); padding-bottom:3px;">重さ</td>
                            <td style="padding-bottom:3px;" th:text="${beetle.weightG != null ? beetle.weightG + ' g' : '-'}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--kw-muted); padding-bottom:3px;">産地</td>
                            <td style="padding-bottom:3px;" th:text="${beetle.locality ?: '-'}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--kw-muted); padding-bottom:3px;">累代</td>
                            <td style="padding-bottom:3px;" th:text="${beetle.generation ?: '-'}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--kw-muted);">羽化</td>
                            <td th:text="${beetle.emergenceDate ?: '-'}"></td>
                        </tr>
                    </table>
                </div>
            </a>
        </div>
    </div>

    <!-- ページネーション -->
    <div th:if="${beetlePage.totalPages > 1}" class="d-flex justify-content-center">
        <ul class="pagination">
            <li class="page-item" th:classappend="${beetlePage.first} ? 'disabled'">
                <a class="page-link page-link-kw"
                   th:href="@{/beetles(page=${beetlePage.number - 1},classification=${selectedClassification},sex=${selectedSex},stage=${selectedStage},locality=${selectedLocality})}">‹</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, beetlePage.totalPages - 1)}"
                class="page-item" th:classappend="${i == beetlePage.number} ? 'active'">
                <a class="page-link page-link-kw"
                   th:href="@{/beetles(page=${i},classification=${selectedClassification},sex=${selectedSex},stage=${selectedStage},locality=${selectedLocality})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${beetlePage.last} ? 'disabled'">
                <a class="page-link page-link-kw"
                   th:href="@{/beetles(page=${beetlePage.number + 1},classification=${selectedClassification},sex=${selectedSex},stage=${selectedStage},locality=${selectedLocality})}">›</a>
            </li>
        </ul>
    </div>

    <div th:unless="${beetlePage.totalElements == 0}" class="text-center mt-1" style="font-size:0.8rem; color:var(--kw-muted);">
        全 <span th:text="${beetlePage.totalElements}"></span> 件中
        <span th:text="${beetlePage.number * 10 + 1}"></span> -
        <span th:text="${beetlePage.number * 10 + beetlePage.numberOfElements}"></span> 件表示
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
