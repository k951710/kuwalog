<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head(${beetle.name})}"></th:block>
    <style>
        .detail-image-main {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
        }
        .detail-image-thumb {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 3px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .detail-image-thumb.active { border-color: var(--kw-accent-light); }
    </style>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- 投稿・更新成功トースト -->
<div th:if="${posted == true or updated == true}" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1100;">
    <div id="actionToast" class="toast align-items-center show"
         style="background:var(--kw-surface); border:1px solid var(--kw-accent); color:var(--kw-text);">
        <div class="d-flex">
            <div class="toast-body" th:text="${posted} ? '投稿しました！' : '更新しました！'"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="container" style="max-width:1000px;">

    <!-- パンくず -->
    <nav class="mb-4" style="font-size:0.8rem; color:var(--kw-muted);">
        <a th:href="@{/beetles}">生体一覧</a>
        <span class="mx-2">/</span>
        <span th:text="${beetle.name}"></span>
    </nav>

    <div class="row g-5">

        <!-- 左カラム: 画像 -->
        <div class="col-md-5">
            <div th:if="${#lists.isEmpty(images)}"
                 class="kw-card d-flex align-items-center justify-content-center"
                 style="aspect-ratio:1; color:var(--kw-muted); font-size:0.85rem;">
                画像なし
            </div>
            <div th:unless="${#lists.isEmpty(images)}">
                <img id="mainImage"
                     th:src="${images[0].imageUrl}"
                     alt="生体画像" class="detail-image-main kw-card">
                <div class="d-flex gap-2 mt-2 flex-wrap">
                    <img th:each="img,i : ${images}"
                         th:src="${img.imageUrl}"
                         th:attr="data-url=${img.imageUrl}"
                         alt="サムネイル"
                         class="detail-image-thumb"
                         th:classappend="${i.index == 0} ? 'active' : ''"
                         onclick="selectImage(this)">
                </div>
            </div>
        </div>

        <!-- 右カラム: スペック -->
        <div class="col-md-7">
            <div class="d-flex align-items-start justify-content-between mb-1">
                <h1 class="h3 m-0" th:text="${beetle.name}"></h1>
                <span style="font-family:monospace; font-size:0.8rem; color:var(--kw-muted);"
                      th:text="${beetle.publicId ?: ''}"></span>
            </div>

            <!-- 産地区分・カテゴリ・種 -->
            <div class="mb-3" style="font-size:0.85rem; color:var(--kw-muted);">
                <span th:if="${speciesOrigin != null}">
                    <span th:text="${speciesOrigin}"></span> /
                </span>
                <span th:if="${beetle.classification != null}">
                    <span th:text="${beetle.classification}"></span> /
                </span>
                <span th:text="${beetle.species ?: '-'}"></span>
            </div>

            <!-- タイトル直下アクション -->
            <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                <span style="font-size:0.85rem; color:var(--kw-muted);">★ <span th:text="${favoriteCount}"></span> 件</span>
                <a th:href="@{/beetles/{id}/transactions(id=${beetle.id})}"
                   class="btn btn-sm btn-kw-outline">譲渡記録を見る</a>
                <a th:if="${beetle.user.username == loginUsername}"
                   th:href="@{/beetles/{id}/transactions/new(id=${beetle.id})}"
                   class="btn btn-sm btn-kw-outline">譲渡記録を登録</a>
                <form th:if="${isAuthenticated and beetle.user.username != loginUsername}"
                      th:action="@{/beetles/{id}/conversations(id=${beetle.id})}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-kw-outline">投稿者に問い合わせる</button>
                </form>
            </div>

            <!-- 説明文 -->
            <div th:if="${beetle.description != null}" class="mb-4">
                <p class="kw-section-title">説明</p>
                <p style="font-size:0.9rem; line-height:1.8;" th:text="${beetle.description}"></p>
            </div>

            <table class="table kw-table">
                <tbody>
                    <tr>
                        <th class="py-2">性別</th>
                        <td class="py-2" th:text="${beetle.sex}"></td>
                    </tr>
                    <tr>
                        <th class="py-2">ステージ</th>
                        <td class="py-2" th:text="${beetle.stage}"></td>
                    </tr>
                    <tr>
                        <th class="py-2">産地</th>
                        <td class="py-2" th:text="${beetle.locality ?: '-'}"></td>
                    </tr>
                    <tr>
                        <th class="py-2">累代</th>
                        <td class="py-2" th:text="${beetle.generation ?: '-'}"></td>
                    </tr>
                    <tr>
                        <th class="py-2">羽化時期</th>
                        <td class="py-2" th:text="${beetle.emergenceDate ?: '-'}"></td>
                    </tr>
                    <tr>
                        <th class="py-2">サイズ</th>
                        <td class="py-2" th:text="${beetle.sizeMm != null ? beetle.sizeMm + ' mm' : '-'}"></td>
                    </tr>
                    <tr>
                        <th class="py-2">重さ</th>
                        <td class="py-2" th:text="${beetle.weightG != null ? beetle.weightG + ' g' : '-'}"></td>
                    </tr>
                    <tr>
                        <th class="py-2">父個体</th>
                        <td class="py-2">
                            <a th:if="${beetle.father != null}"
                               th:href="@{/beetles/{id}(id=${beetle.father.id})}"
                               th:text="${beetle.father.name}"></a>
                            <span th:if="${beetle.father == null}">-</span>
                        </td>
                    </tr>
                    <tr>
                        <th class="py-2">母個体</th>
                        <td class="py-2">
                            <a th:if="${beetle.mother != null}"
                               th:href="@{/beetles/{id}(id=${beetle.mother.id})}"
                               th:text="${beetle.mother.name}"></a>
                            <span th:if="${beetle.mother == null}">-</span>
                        </td>
                    </tr>
                    <tr>
                        <th class="py-2">生産者</th>
                        <td class="py-2">
                            <a th:if="${breederExists}"
                               th:href="@{/users/{u}(u=${beetle.breederName})}"
                               th:text="${beetle.breederName}"></a>
                            <span th:if="${!breederExists}" th:text="${beetle.breederName ?: '-'}"></span>
                        </td>
                    </tr>
                    <tr>
                        <th class="py-2">投稿者</th>
                        <td class="py-2">
                            <a th:href="@{/users/{u}(u=${beetle.user.username})}"
                               th:text="${beetle.user.username}"></a>
                        </td>
                    </tr>
                    <tr>
                        <th class="py-2">投稿日時</th>
                        <td class="py-2" style="font-size:0.85rem; color:var(--kw-muted);"
                            th:text="${#temporals.format(beetle.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
                    </tr>
                </tbody>
            </table>

            <!-- 削除ボタン（誤操作防止のため最下部） -->
            <div th:if="${beetle.user.username == loginUsername}" class="mt-4 pt-3"
                 style="border-top:1px solid var(--kw-border);">
                <form th:action="@{/beetles/{id}/delete(id=${beetle.id})}" method="post" class="m-0"
                      onsubmit="return confirm('この生体を削除しますか？');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">この生体を削除する</button>
                </form>
            </div>
        </div>
    </div>

</div>

<!-- スティッキーボトムバー -->
<div id="stickyBar"
     style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:1000;
            background:var(--kw-surface); border-top:1px solid var(--kw-border);
            padding:0.75rem 1rem;">
    <div class="d-flex gap-2 justify-content-center" style="max-width:1000px; margin:0 auto;">
        <a th:if="${beetle.user.username == loginUsername}"
           th:href="@{/beetles/{id}/edit(id=${beetle.id})}"
           class="btn btn-kw-outline" style="min-width:100px;">編集</a>
        <form th:if="${isAuthenticated}"
              th:action="@{/beetles/{id}/favorite(id=${beetle.id})}" method="post" class="m-0">
            <button type="submit" class="btn"
                    th:classappend="${favorited} ? 'btn-kw-primary' : 'btn-kw-outline'"
                    style="min-width:160px;">
                ★ <span th:text="${favorited} ? 'お気に入り済み' : 'お気に入りに追加'"></span>
            </button>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('stickyBar').style.display = 'block';

function selectImage(thumb) {
    document.getElementById('mainImage').src = thumb.dataset.url;
    document.querySelectorAll('.detail-image-thumb').forEach(t => t.classList.remove('active'));
    thumb.classList.add('active');
}
</script>
</body>
</html>
