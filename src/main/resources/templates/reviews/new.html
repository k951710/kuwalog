<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('評価登録')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:480px;">

    <h1 class="h4 mb-4" style="letter-spacing:0.1em;">評価登録</h1>

    <div class="kw-card p-3 mb-4" style="font-size:0.85rem; color:var(--kw-muted);">
        <span th:text="${transaction.fromUser.username}"></span>
        <span class="mx-2">→</span>
        <span th:text="${transaction.toUser.username}"></span>
        <span class="ms-3" th:text="${transaction.transferredOn}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert py-2 mb-3"
         style="background:#2e1a1a; border-color:#5a2d2d; color:#c87e7e; font-size:0.85rem;"
         th:text="${errorMessage}"></div>

    <div class="kw-card p-4">
        <p class="kw-section-title">
            評価種別:
            <strong th:text="${reviewForm.reviewType.label}"
                    style="color:var(--kw-accent-light);"></strong>
        </p>

        <form th:action="@{/transactions/{id}/reviews(id=${transaction.id})}"
              th:object="${reviewForm}" method="post">

            <input type="hidden" th:field="*{reviewType}">

            <div class="mb-3">
                <label class="form-label">評価（1〜5）</label>
                <select id="rating" th:field="*{rating}" class="form-select">
                    <option value="">選択してください</option>
                    <option th:each="i : ${#numbers.sequence(1, 5)}"
                            th:value="${i}" th:text="${i}"></option>
                </select>
                <div th:if="${#fields.hasErrors('rating')}" class="text-danger small mt-1" th:errors="*{rating}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label">コメント（任意）</label>
                <textarea id="comment" th:field="*{comment}" class="form-control" rows="4"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-kw-primary">登録する</button>
                <a th:href="@{/beetles/{id}/transactions(id=${transaction.beetle.id})}"
                   class="btn btn-kw-outline">キャンセル</a>
            </div>

        </form>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
