<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ja">

<!-- ===== head フラグメント ===== -->
<th:block th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' - クワログ'">クワログ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --kw-bg: #f8f6f2;
            --kw-surface: #ffffff;
            --kw-border: #e0dcd5;
            --kw-accent: #8b6914;
            --kw-accent-light: #a07820;
            --kw-text: #1a1a1a;
            --kw-muted: #888;
        }
        body {
            background-color: var(--kw-bg);
            color: var(--kw-text);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }
        .navbar-kw {
            background-color: var(--kw-surface);
            border-bottom: 1px solid var(--kw-border);
        }
        .navbar-brand-kw {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--kw-accent-light) !important;
            text-decoration: none;
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%2826,26,26,0.85%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        .nav-link-kw {
            color: var(--kw-text) !important;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-decoration: none;
        }
        .nav-link-kw:hover { color: var(--kw-accent-light) !important; }
        .kw-card {
            background-color: var(--kw-surface);
            border: 1px solid var(--kw-border);
            border-radius: 4px;
        }
        .kw-table { color: var(--kw-text); }
        .kw-table th {
            color: var(--kw-muted);
            font-weight: 400;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            border-color: var(--kw-border);
        }
        .kw-table td { border-color: var(--kw-border); }
        .kw-table tbody tr:hover td { background-color: rgba(0,0,0,0.03); }
        .btn-kw-primary {
            background-color: var(--kw-accent);
            border-color: var(--kw-accent);
            color: #fff;
            letter-spacing: 0.05em;
        }
        .btn-kw-primary:hover {
            background-color: var(--kw-accent-light);
            border-color: var(--kw-accent-light);
            color: #fff;
        }
        .btn-kw-outline {
            border-color: var(--kw-border);
            color: var(--kw-text);
        }
        .btn-kw-outline:hover {
            background-color: var(--kw-border);
            color: var(--kw-text);
        }
        .form-control, .form-select {
            background-color: #ffffff;
            border-color: var(--kw-border);
            color: var(--kw-text);
        }
        .form-control:focus, .form-select:focus {
            background-color: #ffffff;
            border-color: var(--kw-accent);
            color: var(--kw-text);
            box-shadow: 0 0 0 0.2rem rgba(139,105,20,0.25);
        }
        .form-label {
            color: var(--kw-muted);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
        .kw-section-title {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--kw-muted);
            border-bottom: 1px solid var(--kw-border);
            padding-bottom: 0.5rem;
            margin-bottom: 1.25rem;
        }
        a { color: var(--kw-accent-light); }
        a:hover { color: #e0b83a; }
        footer {
            border-top: 1px solid var(--kw-border);
            color: var(--kw-muted);
            font-size: 0.8rem;
        }
        .spec-label {
            color: var(--kw-muted);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .spec-value { font-size: 0.95rem; }
    </style>
</th:block>

<!-- ===== navbar フラグメント ===== -->
<nav th:fragment="navbar" class="navbar navbar-kw px-3 px-md-4 py-3 mb-5" style="position:relative;">
    <a class="navbar-brand-kw" th:href="@{/beetles}">KUWALOG</a>

    <!-- PC: 横並びメニュー -->
    <div class="d-none d-md-flex align-items-center gap-3">
        <a class="nav-link-kw" th:href="@{/beetles}">生体一覧</a>
        <a class="nav-link-kw" th:href="@{/ranking}">ランキング</a>
        <th:block th:if="${isAuthenticated}">
            <a class="nav-link-kw" th:href="@{/favorites}">★ お気に入り</a>
            <a class="nav-link-kw position-relative" th:href="@{/conversations}">
                メッセージ
                <span th:if="${unreadMessageCount > 0}"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill"
                      style="background-color:#e74c3c; font-size:0.65rem; min-width:1.2em;"
                      th:text="${unreadMessageCount}"></span>
            </a>
            <a class="nav-link-kw" th:href="@{/beetles/new}">投稿</a>
            <a class="nav-link-kw d-flex align-items-center gap-2"
               th:href="@{/users/{u}(u=${loginUsername})}">
                <img th:if="${loginUserProfileImageUrl != null}"
                     th:src="${loginUserProfileImageUrl}"
                     alt="プロフィール"
                     style="width:24px; height:24px; border-radius:50%; object-fit:cover; border:1px solid var(--kw-border);">
                <span th:if="${loginUserProfileImageUrl == null}"
                      style="width:24px; height:24px; border-radius:50%; background:var(--kw-border);
                             display:inline-flex; align-items:center; justify-content:center; font-size:0.7rem;">
                    &#128027;
                </span>
                <span th:text="${loginUsername}"></span>
            </a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-sm btn-kw-outline">ログアウト</button>
            </form>
        </th:block>
        <th:block th:unless="${isAuthenticated}">
            <a class="btn btn-sm btn-kw-outline" th:href="@{/login}">ログイン</a>
            <a class="btn btn-sm btn-kw-outline" th:href="@{/users/register}">新規登録</a>
        </th:block>
    </div>

    <!-- スマホ: アカウント名 + ハンバーガーボタン -->
    <div class="d-md-none d-flex align-items-center gap-2">
        <a th:if="${isAuthenticated}" class="nav-link-kw d-flex align-items-center gap-2"
           th:href="@{/users/{u}(u=${loginUsername})}">
            <img th:if="${loginUserProfileImageUrl != null}"
                 th:src="${loginUserProfileImageUrl}"
                 alt="プロフィール"
                 style="width:24px; height:24px; border-radius:50%; object-fit:cover; border:1px solid var(--kw-border);">
            <span th:if="${loginUserProfileImageUrl == null}"
                  style="width:24px; height:24px; border-radius:50%; background:var(--kw-border);
                         display:inline-flex; align-items:center; justify-content:center; font-size:0.7rem;">
                &#128027;
            </span>
            <span th:text="${loginUsername}" style="font-size:0.9rem;"></span>
        </a>
        <button id="navToggle" class="border-0 bg-transparent p-1" aria-label="メニュー"
                onclick="toggleNavMenu(event)">
            <span class="navbar-toggler-icon" style="display:inline-block; width:1.5em; height:1.5em;"></span>
        </button>
    </div>

    <!-- スマホ: ポップアップメニュー -->
    <div id="navMenu"
         style="display:none; position:absolute; top:100%; right:0; min-width:180px;
                background:var(--kw-surface); border:1px solid var(--kw-border);
                border-radius:4px; padding:0.75rem 1rem; z-index:1050;
                box-shadow:0 4px 16px rgba(0,0,0,0.12);"
         class="d-md-none">
        <div class="d-flex flex-column gap-3">
            <a class="nav-link-kw" th:href="@{/beetles}">生体一覧</a>
            <a class="nav-link-kw" th:href="@{/ranking}">ランキング</a>
            <th:block th:if="${isAuthenticated}">
                <a class="nav-link-kw" th:href="@{/favorites}">★ お気に入り</a>
                <a class="nav-link-kw position-relative" th:href="@{/conversations}">
                    メッセージ
                    <span th:if="${unreadMessageCount > 0}"
                          class="badge rounded-pill ms-1"
                          style="background-color:#e74c3c; font-size:0.65rem;"
                          th:text="${unreadMessageCount}"></span>
                </a>
                <a class="nav-link-kw" th:href="@{/beetles/new}">投稿</a>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-kw-outline w-100">ログアウト</button>
                </form>
            </th:block>
            <th:block th:unless="${isAuthenticated}">
                <a class="btn btn-sm btn-kw-outline" th:href="@{/login}">ログイン</a>
                <a class="btn btn-sm btn-kw-outline" th:href="@{/users/register}">新規登録</a>
            </th:block>
        </div>
    </div>

    <script>
        function toggleNavMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('navMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
        document.addEventListener('click', function() {
            const menu = document.getElementById('navMenu');
            if (menu) menu.style.display = 'none';
        });
    </script>
</nav>

<!-- ===== footer フラグメント ===== -->
<footer th:fragment="footer" class="text-center py-4 mt-5">
    <span>© 2026 KUWALOG</span>
</footer>

</html>
