<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録 - クワログ</title>
</head>
<body>

<h1>ユーザー登録</h1>

<div th:if="${param.success}">
    <p>登録が完了しました。</p>
</div>

<form th:action="@{/users/register}" th:object="${userRegisterForm}" method="post">

    <div>
        <label for="username">ユーザー名</label>
        <input type="text" id="username" th:field="*{username}">
        <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
    </div>

    <div>
        <label for="email">メールアドレス</label>
        <input type="email" id="email" th:field="*{email}">
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>

    <div>
        <label for="password">パスワード（8文字以上）</label>
        <input type="password" id="password" th:field="*{password}">
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </div>

    <div>
        <label for="passwordConfirm">パスワード（確認）</label>
        <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}">
        <span th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></span>
    </div>

    <button type="submit">登録する</button>
</form>

</body>
</html>
