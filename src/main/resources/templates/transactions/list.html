<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ja">
<head>
    <th:block th:replace="~{fragments/layout :: head('譲渡記録')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:900px;">

    <nav class="mb-4" style="font-size:0.8rem; color:var(--kw-muted);">
        <a th:href="@{/beetles}">生体一覧</a>
        <span class="mx-2">/</span>
        <a th:href="@{/beetles/{id}(id=${beetle.id})}" th:text="${beetle.name}"></a>
        <span class="mx-2">/</span>
        <span>譲渡記録</span>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4 m-0" style="letter-spacing:0.1em;">譲渡記録一覧</h1>
    </div>

    <div th:if="${#lists.isEmpty(transactions)}" class="kw-card p-4" style="color:var(--kw-muted); font-size:0.9rem;">
        譲渡記録はありません。
    </div>

    <div th:unless="${#lists.isEmpty(transactions)}">
        <div th:each="t : ${transactions}" class="kw-card mb-3 p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div style="font-size:0.9rem;">
                    <a th:href="@{/users/{u}(u=${t.fromUser.username})}" th:text="${t.fromUser.username}"></a>
                    <span style="color:var(--kw-muted); margin:0 0.5rem;">→</span>
                    <a th:href="@{/users/{u}(u=${t.toUser.username})}" th:text="${t.toUser.username}"></a>
                    <span class="ms-3" style="color:var(--kw-muted); font-size:0.8rem;" th:text="${t.transferredOn}"></span>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <div th:if="${t.fromUser.username == loginUsername or t.toUser.username == loginUsername}"
                         class="d-flex gap-2">
                        <a th:href="@{/transactions/{id}/reviews/new(id=${t.id},reviewType='NORMAL')}"
                           class="btn btn-sm btn-kw-outline"
                           th:classappend="${registeredTypesMap[t.id].contains('NORMAL')} ? ' disabled'"
                           th:aria-disabled="${registeredTypesMap[t.id].contains('NORMAL')}">通常評価</a>
                        <a th:href="@{/transactions/{id}/reviews/new(id=${t.id},reviewType='FOLLOW_UP')}"
                           class="btn btn-sm btn-kw-outline"
                           th:classappend="${registeredTypesMap[t.id].contains('FOLLOW_UP')} ? ' disabled'"
                           th:aria-disabled="${registeredTypesMap[t.id].contains('FOLLOW_UP')}">後追い評価</a>
                    </div>
                    <form th:if="${t.fromUser.username == loginUsername}"
                          th:action="@{/beetles/{beetleId}/transactions/{id}/delete(beetleId=${beetle.id},id=${t.id})}"
                          method="post" class="m-0"
                          onsubmit="return confirm('この譲渡記録を削除しますか？');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                    </form>
                </div>
            </div>

            <!-- 紐づく評価 -->
            <div th:unless="${#lists.isEmpty(reviewsMap[t.id])}" class="mt-2">
                <p class="kw-section-title" style="font-size:0.7rem;">評価</p>
                <table class="table kw-table mb-0" style="font-size:0.85rem;">
                    <thead>
                        <tr>
                            <th class="py-2">種別</th>
                            <th class="py-2">評価者</th>
                            <th class="py-2">被評価者</th>
                            <th class="py-2">評価</th>
                            <th class="py-2">コメント</th>
                            <th class="py-2">日時</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${reviewsMap[t.id]}">
                            <td class="py-2" th:text="${r.reviewType.label}"></td>
                            <td class="py-2" th:text="${r.reviewer.username}"></td>
                            <td class="py-2" th:text="${r.reviewee.username}"></td>
                            <td class="py-2" th:text="${r.rating}"></td>
                            <td class="py-2" th:text="${r.comment ?: '-'}"></td>
                            <td class="py-2" style="color:var(--kw-muted);"
                                th:text="${#temporals.format(r.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <a th:href="@{/beetles/{id}(id=${beetle.id})}" class="btn btn-sm btn-kw-outline mt-2">生体詳細に戻る</a>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
